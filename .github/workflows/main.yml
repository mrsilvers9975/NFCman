    - name: Fix malformed XML files using Python
      run: |
        python3 << 'PYEOF'
        import os
        
        def fix_xml_file(filepath):
            with open(filepath, 'r', encoding='utf-8') as f:
                lines = f.readlines()
            
            start_idx = 0
            for i, line in enumerate(lines):
                if '<?xml' in line:
                    start_idx = i
                    break
            
            with open(filepath, 'w', encoding='utf-8') as f:
                f.writelines(lines[start_idx:])
            
            print(f"Fixed: {filepath}")
        
        for root, dirs, files in os.walk('app/src/main/res'):
            for file in files:
                if file.endswith('.xml'):
                    fix_xml_file(os.path.join(root, file))
        
        print("All XML files fixed!")
        PYEOF
        
