name: Build NFCman APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install platform and build tools
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

    - name: Create complete Gradle project from scratch
      run: |
        mkdir -p app/src/main/java/com/nfcclone/app
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/test/java
        mkdir -p app/src/androidTest/java

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "NFCman"
        include ':app'
        EOF

    - name: Create root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        // Top-level build file
        EOF

    - name: Create gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        kotlin.code.style=official
        android.nonTransitiveRClass=true
        EOF

    - name: Create app/build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.nfcclone.app'
            compileSdk 34

            defaultConfig {
                applicationId "com.nfcclone.app"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    - name: Create proguard-rules.pro
      run: |
        cat > app/proguard-rules.pro << 'EOF'
        # ProGuard rules
        EOF

    - name: Check what files exist in android/
      run: |
        echo "=== Contents of android/ directory ==="
        find android -type f | sort
        echo ""
        echo "=== AndroidManifest.xml ==="
        cat android/AndroidManifest.xml || echo "NOT FOUND"

    - name: Copy NFCman source files
      run: |
        if [ -d "android/src/com/nfcclone/app" ]; then
          cp -r android/src/com/nfcclone/app/* app/src/main/java/com/nfcclone/app/
        fi
        
        if [ -d "android/res" ]; then
          cp -r android/res/* app/src/main/res/ || true
        fi
        
        if [ -f "android/AndroidManifest.xml" ]; then
          cp android/AndroidManifest.xml app/src/main/
        fi

    - name: Create basic resource files if missing
      run: |
        if [ ! -f "app/src/main/res/values/strings.xml" ]; then
          cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">NFCman</string>
        </resources>
        EOF
        fi
        
        if [ ! -f "app/src/main/res/values/colors.xml" ]; then
          cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="purple_200">#FFBB86FC</color>
            <color name="purple_500">#FF6200EE</color>
            <color name="purple_700">#FF3700B3</color>
            <color name="teal_200">#FF03DAC5</color>
            <color name="teal_700">#FF018786</color>
            <color name="black">#FF000000</color>
            <color name="white">#FFFFFFFF</color>
        </resources>
        EOF
        fi
        
        if [ ! -f "app/src/main/res/values/themes.xml" ]; then
          cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.NFCman" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
                <item name="colorPrimary">@color/purple_500</item>
                <item name="colorPrimaryVariant">@color/purple_700</item>
                <item name="colorOnPrimary">@color/white</item>
                <item name="colorSecondary">@color/teal_200</item>
                <item name="colorSecondaryVariant">@color/teal_700</item>
                <item name="colorOnSecondary">@color/black</item>
            </style>
        </resources>
        EOF
        fi

    - name: Install ImageMagick and create launcher icons
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        
        sizes=("mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192")
        for size_pair in "${sizes[@]}"; do
          IFS=':' read -r density size <<< "$size_pair"
          dir="app/src/main/res/mipmap-$density"
          mkdir -p "$dir"
          
          convert -size ${size}x${size} xc:transparent \
            -fill '#2196F3' -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size/4))" \
            "$dir/ic_launcher.png"
          
          cp "$dir/ic_launcher.png" "$dir/ic_launcher_foreground.png"
          convert -size ${size}x${size} xc:'#2196F3' "$dir/ic_launcher_background.png"
        done
        
        echo "Icons created successfully"

    - name: Verify project structure
      run: |
        echo "=== Java files ==="
        find app/src -name "*.java" | sort
        echo ""
        echo "=== XML files ==="
        find app/src -name "*.xml" | sort
        echo ""
        echo "=== AndroidManifest.xml ==="
        cat app/src/main/AndroidManifest.xml

    - name: Build with Gradle
      run: |
        gradle wrapper --gradle-version 8.5
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: NFCman-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
